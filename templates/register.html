<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Create Account</h2>

{% with messages=get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<p class="msg">{{message}}</p>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>
Register
</button>

</form>

<p>

Already Registered?

<a href="/login">

Login Here

</a>

</p>

</div>

</body>

</html>
